spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/order-system
    username: postgres
    password: ${DB_PASSWORD:1961}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
