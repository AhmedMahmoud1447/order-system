spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/data_jpa
    username: postgres
    password: ${DB_PASSWORD:1961}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true